name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run integration tests
        run: bun run test
        env:
          DATABASE_URL: "file:./prisma/test.db"
          DIRECT_DATABASE_URL: "file:./prisma/test.db"
          NEXTAUTH_SECRET: "ci-secret-not-real"
          AUDIT_INTERNAL_SECRET: "ci-audit-secret"
